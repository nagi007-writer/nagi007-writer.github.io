name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main # mainブランチにプッシュされた時に起動（masterの場合は書き換えてください）

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 成果物をリポジトリに書き込むために必須

    steps:
      # 1. コードのチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 環境のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 依存パッケージのインストール
      - name: Install dependencies
        run: npm ci

      # 4. Astroの本番用ビルド（distフォルダが生成されます）
      - name: Build Astro site
        run: npm run build

      # 5. GitHub Pages用の専用ブランチ（gh-pages）へdistの中身をデプロイ
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist